name: Live Milano Agent

on:
  workflow_dispatch:  # lancio manuale con un click

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # permesso per fare push della pagina HTML

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          mkdir -p output
          python agent/main.py

      - name: Copy agenda to docs/ for GitHub Pages
        run: |
          mkdir -p docs
          cp output/agenda.html docs/index.html

      - name: Commit and push agenda.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html output/agenda.html
          git diff --cached --quiet || git commit -m "Update agenda - $(date +'%Y-%m-%d %H:%M')"
          git push
